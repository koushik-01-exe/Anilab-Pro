<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="50%" style="stop-color:#0a2a4a"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7">
        <animate attributeName="stop-color" values="#4fc3f7;#81d4fa;#29b6f6;#4fc3f7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#81d4fa">
        <animate attributeName="stop-color" values="#81d4fa;#4fc3f7;#e0f7fa;#81d4fa" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#29b6f6">
        <animate attributeName="stop-color" values="#29b6f6;#4fc3f7;#81d4fa;#29b6f6" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="30%" style="stop-color:#4fc3f7"/>
      <stop offset="70%" style="stop-color:#81d4fa"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="url(#bg)" rx="12"/>

  <!-- Animated background circles -->
  <circle cx="100" cy="80" r="60" fill="#1e90ff" opacity="0.04">
    <animate attributeName="r" values="60;80;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.08;0.04" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="80" r="70" fill="#4fc3f7" opacity="0.04">
    <animate attributeName="r" values="70;50;70" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.04;0.09;0.04" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="30" r="40" fill="#29b6f6" opacity="0.05">
    <animate attributeName="cy" values="30;50;30" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating particles -->
  <circle cx="200" cy="40" r="2" fill="#4fc3f7" opacity="0.6">
    <animate attributeName="cy" values="40;20;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="120" r="2" fill="#81d4fa" opacity="0.5">
    <animate attributeName="cy" values="120;100;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="140" r="1.5" fill="#29b6f6" opacity="0.7">
    <animate attributeName="cy" values="140;120;140" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="30" r="1.5" fill="#4fc3f7" opacity="0.5">
    <animate attributeName="cy" values="30;50;30" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Top line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#lineGrad)" rx="1" opacity="0.8"/>
  <!-- Bottom line -->
  <rect x="0" y="158" width="900" height="2" fill="url(#lineGrad)" rx="1" opacity="0.8"/>

  <!-- Emoji -->
  <text x="450" y="62" font-size="28" text-anchor="middle" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">🎌</text>

  <!-- Main Title -->
  <text x="450" y="105" font-size="38" font-weight="800" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        fill="url(#textGrad)" filter="url(#glow)" letter-spacing="2">
    AniLab Pro
  </text>

  <!-- Subtitle -->
  <text x="450" y="130" font-size="13" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        fill="#90caf9" letter-spacing="3" opacity="0.85">
    CLEAN  •  OPTIMIZED  •  ENHANCED
  </text>
</svg>
